name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macOS-ARM
          - platform: ubuntu-22.04
            args: ''
            label: Linux-x64
          - platform: windows-latest
            args: '--bundles nsis'
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.309.0
          cache: true
          stripdown: true

      # Windows MAX_PATH workaround: whisper.cpp's vulkan-shaders-gen sub-build
      # creates deeply nested TryCompile paths that exceed 260 chars. MSBuild's
      # FileTracker uses legacy Win32 APIs that ignore LongPathsEnabled, so the
      # only fix is to keep the target dir short. tauri-action honours
      # CARGO_TARGET_DIR for artifact discovery (see tauri-action/src/utils.ts).
      - name: Short CARGO_TARGET_DIR (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: echo "CARGO_TARGET_DIR=C:/t" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-directories: ${{ matrix.platform == 'windows-latest' && 'C:/t' || '' }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'macos-')
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/cert.p12
          echo "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign
          rm -f "$CERT_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application:" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Write Apple API key file for notarization
        if: startsWith(matrix.platform, 'macos-')
        env:
          NOTARIZE_KEY_BASE64: ${{ secrets.NOTARIZE_KEY_BASE64 }}
          NOTARIZE_KEY_ID: ${{ secrets.NOTARIZE_KEY_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${NOTARIZE_KEY_ID}.p8"
          echo "$NOTARIZE_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing — uses certificate imported in previous step
          APPLE_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          # macOS notarization — API key written to file in previous step
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_API_ISSUER: ${{ secrets.NOTARIZE_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.NOTARIZE_KEY_ID }}
          # Updater artifact signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # whisper.cpp build flags per platform:
          # - macOS: override -march to avoid i8mm detection mismatch on M-series < M4 (Metal GPU always active)
          # - Linux: -fPIC required for whisper-rs-sys static linking
          # - Windows: Vulkan GPU support enabled via target-specific Cargo.toml dependency
          #   (whisper-rs = { version = "0.16", features = ["vulkan"] } in [target.'cfg(windows)'.dependencies])
          #   Vulkan SDK installed via jakoch/install-vulkan-sdk-action.
          #   For optional CUDA support, add: Jimver/cuda-toolkit@v0.2.x + FEATURES=cuda cargo flag.
          CMAKE_C_FLAGS: ${{ matrix.label == 'macOS-ARM' && '-march=armv8.4-a' || matrix.label == 'Linux-x64' && '-fPIC' || '' }}
          CMAKE_CXX_FLAGS: ${{ matrix.label == 'macOS-ARM' && '-march=armv8.4-a' || matrix.label == 'Linux-x64' && '-fPIC' || '' }}
        with:
          tauriScript: npx tauri
          tagName: v__VERSION__
          releaseName: 'TUICommander v__VERSION__'
          releaseBody: 'Download the appropriate installer for your platform.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Cleanup macOS keychain
        if: always() && startsWith(matrix.platform, 'macos-')
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$APPLE_API_KEY_PATH" 2>/dev/null || true

  finalize-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Build release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          TAG="v${VERSION}"

          # Extract changelog section for this version
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md > /tmp/changelog-section.md

          # Build release body: changelog + download legend
          {
            echo "## What's Changed"
            echo ""
            if [ -s /tmp/changelog-section.md ]; then
              cat /tmp/changelog-section.md
            else
              echo "See [CHANGELOG.md](https://github.com/sstraus/tuicommander/blob/main/CHANGELOG.md) for details."
            fi
            echo ""
            # Download legend (quoted heredoc — no variable expansion)
            cat <<'LEGEND'
          ---

          📦 **Downloads**

          Pick the right build for your system:
          LEGEND
            # Version-specific filenames (unquoted heredoc for variable expansion)
            cat <<FILENAMES

          * 🍎 **macOS** (Apple Silicon)
              \`TUICommander_${VERSION}_aarch64.dmg\`
              (alt: \`TUICommander_aarch64.app.tar.gz\`)
          * 🪟 **Windows** (64-bit)
              \`TUICommander_${VERSION}_x64-setup.exe\`
          * 🐧 **Linux** (Debian / Ubuntu)
              \`TUICommander_${VERSION}_amd64.deb\`
          * 🐧 **Linux** (RHEL / Fedora / CentOS)
              \`TUICommander-${VERSION}-1.x86_64.rpm\`
          * 🐧 **Linux** (portable)
              \`TUICommander_${VERSION}_amd64.AppImage\`
          FILENAMES
            cat <<'FOOTER'

          ---

          🔐 **Verify** (optional)

          Each release includes `.sig` files for signature verification.

          ---

          💻 **Install via terminal**

          ```bash
          # macOS (Homebrew)
          brew install sstraus/tap/tuicommander

          # macOS / Linux
          curl -fsSL https://tuicommander.com/install.sh | sh
          ```

          ```powershell
          # Windows (PowerShell)
          irm https://tuicommander.com/install.ps1 | iex
          ```
          FOOTER
          } > /tmp/release-body.md

          gh release edit "${TAG}" --notes-file /tmp/release-body.md --draft=false
