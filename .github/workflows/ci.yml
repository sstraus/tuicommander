name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + tests)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run --reporter=verbose

  # Always runs: clippy + tests on Linux (fastest, catches most issues)
  rust:
    name: Rust (Linux-x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Create dist stub for include_dir
        run: mkdir -p dist && echo '<html></html>' > dist/index.html

      - name: Create sidecar stub for Tauri build.rs
        run: |
          target=$(rustc --print host-tuple)
          touch "src-tauri/binaries/tuic-bridge-${target}"

      - name: Clippy
        working-directory: src-tauri
        env:
          CMAKE_C_FLAGS: '-fPIC'
          CMAKE_CXX_FLAGS: '-fPIC'
        run: cargo clippy -- -D warnings

      - name: Tests
        working-directory: src-tauri
        env:
          CMAKE_C_FLAGS: '-fPIC'
          CMAKE_CXX_FLAGS: '-fPIC'
        run: cargo test

  # Push to main only: verify build on macOS and Windows.
  # GPU notes:
  # - macOS: whisper-rs compiled with Metal (target-specific dep) — always GPU.
  # - Windows: whisper-rs compiled with Vulkan (target-specific dep).
  #   Vulkan SDK installed via jakoch/install-vulkan-sdk-action.
  #   CUDA support is optional (add Jimver/cuda-toolkit + --features cuda if needed).
  rust-cross:
    name: Rust (${{ matrix.label }})
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          # TEMP: macOS disabled while iterating on Windows Vulkan SDK fix. Re-enable once green.
          # - platform: macos-latest
          #   label: macOS-ARM
          - platform: windows-latest
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.309.0
          cache: true
          stripdown: true

      # Windows MAX_PATH workaround: whisper.cpp's vulkan-shaders-gen sub-build
      # creates deeply nested TryCompile paths that exceed 260 chars. MSBuild's
      # FileTracker uses legacy Win32 APIs that ignore LongPathsEnabled, so the
      # only fix is to keep the target dir short.
      - name: Short CARGO_TARGET_DIR (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: echo "CARGO_TARGET_DIR=C:/t" >> $GITHUB_ENV

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        if: matrix.platform != 'windows-latest'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Create dist stub for include_dir
        shell: bash
        run: mkdir -p dist && echo '<html></html>' > dist/index.html

      - name: Create sidecar stub for Tauri build.rs
        shell: bash
        run: |
          target=$(rustc --print host-tuple)
          touch "src-tauri/binaries/tuic-bridge-${target}"
          # Windows needs .exe extension for sidecar resolution
          if [[ "$target" == *windows* ]]; then
            touch "src-tauri/binaries/tuic-bridge-${target}.exe"
          fi

      - name: Clippy
        working-directory: src-tauri
        env:
          CMAKE_C_FLAGS: ${{ matrix.label == 'macOS-ARM' && '-march=armv8.4-a' || '' }}
          CMAKE_CXX_FLAGS: ${{ matrix.label == 'macOS-ARM' && '-march=armv8.4-a' || '' }}
        run: cargo clippy -- -D warnings

      - name: Tests
        if: matrix.platform != 'windows-latest'
        working-directory: src-tauri
        env:
          CMAKE_C_FLAGS: ${{ matrix.label == 'macOS-ARM' && '-march=armv8.4-a' || '' }}
          CMAKE_CXX_FLAGS: ${{ matrix.label == 'macOS-ARM' && '-march=armv8.4-a' || '' }}
        run: cargo test
